name: Build and publish Python package

on:
  push:
    tags:
      - 'v*'  # Triggers on tag push

jobs:
  build-and-publish:
    # This ensures the job only runs if the tag was pushed on the 'main' branch
    if: github.event.base_ref == 'refs/heads/main' || github.ref_name != '' 
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build twine setuptools_scm
          pip install mkdocs-material mike mkdocstrings[python] mkdocs-git-revision-date-localized-plugin timm

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel
        
      - name: Deploy Documentation
        run: |
          VERSION=${GITHUB_REF_NAME#v}
      
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      
          git fetch origin docs:docs || true
      
          mike deploy --push --update-aliases $VERSION stable
          mike set-default --push stable
          
      - name: Check artifacts
        run: ls -l dist

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine check dist/*
          python -m twine upload dist/* --non-interactive
