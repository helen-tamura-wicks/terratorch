[tox]
requires =
    tox >= 4.20
env_list =
    py313
    py312
    py311

[testenv]
basepython =
    py313: python3.13
    py312: python3.12
    py311: python3.11
deps =
    pytest
    .[wxc,test,geobenchv2]
commands = pytest -s -v tests

[testenv:integration-tests-vllm-release-{py313,py312,py311}]
description = Run Terratorch integration tests with vLLM (release) using Python {envname}
deps =
    pytest
    .[vllm,vllm_test]
commands = pytest -s -v integrationtests/vLLM

[testenv:integration-tests-vllm-main-{py313,py312,py311}]
description = Run Terratorch integration tests with vLLM (main) using Python {envname}
setenv =
    VLLM_USE_PRECOMPILED = 1
    ; If the run fails because vLLM cannot find a precompiled wheel,
    ; set the value of VLLM_PRECOMPILED_WHEEL_LOCATION env variable to the output of the command below
    ;   curl -s https://wheels.vllm.ai/nightly/cu129/vllm/ | grep -oP 'href="[^"]*x86_64[^"]*\.whl"' | grep -oP '(?<=href=")[^"]*' | head -1 | sed 's|^\.\./\.\./\.\./|https://wheels.vllm.ai/|'
    ;
    ; VLLM_PRECOMPILED_WHEEL_LOCATION = {URL FROM CURL}
deps =
    pytest
    .[vllm,vllm_test]
    https://github.com/vllm-project/vllm.git
    
commands = 
    pytest -s -v integrationtests/vLLM

[testenv:vllm-tests-tt-main-{py313,py312,py311}]
description = Run vLLM (main) io processor plugin with TerraTorch current branch using with Python {envname}
allowlist_externals = 
    git
    pip
    uv
    sh
setenv =
    VLLM_USE_PRECOMPILED = 1
    ; If the run fails because vLLM cannot find a precompiled wheel,
    ; set the value of VLLM_PRECOMPILED_WHEEL_LOCATION env variable to the output of the command below
    ;   curl -s https://wheels.vllm.ai/nightly/cu129/vllm/ | grep -oP 'href="[^"]*x86_64[^"]*\.whl"' | grep -oP '(?<=href=")[^"]*' | head -1 | sed 's|^\.\./\.\./\.\./|https://wheels.vllm.ai/|'
    ;
    ; VLLM_PRECOMPILED_WHEEL_LOCATION = {URL FROM CURL}
    VLLM_SOURCE_DIR = {envtmpdir}/vllm
    VLLM_TEST_PLUGIN_PATH = tests/plugins/prithvi_io_processor_plugin
deps =
    pytest
    pytest-asyncio
    geobenchv2>=0.9
    impactmesh>0.1.0
    tblib
    .[vllm_test]    
commands = 
    ; Clone the vLLM repo
    git clone -b main --single-branch https://github.com/vllm-project/vllm.git {env:VLLM_SOURCE_DIR}
    ; Install vLLM
    sh -c 'if command -v uv >/dev/null 2>&1; then uv pip install {env:VLLM_SOURCE_DIR} --force-reinstall ; else pip install {env:VLLM_SOURCE_DIR} --force-reinstall; fi'
    ; Install the Prithvi IO Processor plugins in vLLM source code
    sh -c 'if command -v uv >/dev/null 2>&1; then uv pip install {env:VLLM_SOURCE_DIR}/{env:VLLM_TEST_PLUGIN_PATH}; else pip install {env:VLLM_SOURCE_DIR}/{env:VLLM_TEST_PLUGIN_PATH}; fi'
    ; Run vLLM prithvi plugin tests
    pytest -s -v {env:VLLM_SOURCE_DIR}/tests/plugins_tests/test_io_processor_plugins.py